      <!-- Add your Google Search Console verification tag here once the property is created, e.g.:
      <meta name="google-site-verification" content="REPLACE_WITH_YOUR_CODE" /> -->
      <script type="text/javascript">
        // Counterpart to public/404.html's redirect: restores the original
        // deep-linked path before React Router mounts.
        (function (l) {
          if (l.search[1] === '/') {
            var decoded = l.search.slice(1).split('&').map(function (s) {
              return s.replace(/~and~/g, '&');
            }).join('?');
            window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
          }
        }(window.location));
      </script>

      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
